kind = "web"
previewPath = "/"
title = "Sina Commercial"
version = "1.0.0"
id = "artifacts/sina-commercial"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18753

[services.development]
run = "pnpm --filter @workspace/sina-commercial run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sina-commercial", "run", "build" ]
publicDir = "artifacts/sina-commercial/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18753"
BASE_PATH = "/"
