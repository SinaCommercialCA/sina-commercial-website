<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2d5a"/>
      <stop offset="100%" stop-color="#13203e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5d442"/>
      <stop offset="100%" stop-color="#c49b20"/>
    </linearGradient>
    <linearGradient id="goldDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4b830"/>
      <stop offset="100%" stop-color="#a07d18"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4423c"/>
      <stop offset="100%" stop-color="#a02a24"/>
    </linearGradient>
  </defs>
  <rect width="180" height="180" rx="36" fill="url(#bg)"/>
  <!-- Left buildings -->
  <rect x="22" y="82" width="20" height="76" rx="3" fill="url(#goldDark)"/>
  <rect x="46" y="62" width="20" height="96" rx="3" fill="url(#gold)"/>
  <rect x="24" y="78" width="4" height="8" rx="1" fill="#fff" opacity="0.3"/>
  <rect x="48" y="58" width="4" height="8" rx="1" fill="#fff" opacity="0.3"/>
  <rect x="54" y="58" width="4" height="8" rx="1" fill="#fff" opacity="0.2"/>
  <!-- Center tall towers -->
  <rect x="70" y="34" width="18" height="124" rx="4" fill="url(#gold)"/>
  <rect x="92" y="34" width="18" height="124" rx="4" fill="url(#gold)"/>
  <rect x="72" y="30" width="4" height="8" rx="1" fill="#fff" opacity="0.4"/>
  <rect x="80" y="30" width="4" height="8" rx="1" fill="#fff" opacity="0.3"/>
  <rect x="94" y="30" width="4" height="8" rx="1" fill="#fff" opacity="0.4"/>
  <rect x="102" y="30" width="4" height="8" rx="1" fill="#fff" opacity="0.3"/>
  <!-- Right buildings -->
  <rect x="114" y="70" width="18" height="88" rx="3" fill="url(#gold)"/>
  <rect x="136" y="88" width="22" height="70" rx="3" fill="url(#red)"/>
  <rect x="116" y="66" width="4" height="8" rx="1" fill="#fff" opacity="0.3"/>
  <rect x="138" y="84" width="4" height="8" rx="1" fill="#fff" opacity="0.2"/>
  <!-- Ground reflection line -->
  <rect x="22" y="158" width="136" height="2" rx="1" fill="#fff" opacity="0.15"/>
</svg>
